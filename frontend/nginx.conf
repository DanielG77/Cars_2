server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location / {
        # SPA fallback: cualquier ruta que no sea un fichero real apunta a index.html
        # para que Vue Router gestione la navegación en el cliente
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos generados por Vite (con hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
